spring.application.name=Shopping_Cart
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart
spring.datasource.username=root
spring.datasource.password=shubham

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080


spring.main.allow-circular-references=true

spring.mail.host=smtp.gmail.com
spring.mail.username=yourmail@gmail.com
spring.mail.password=**************
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.otp.length=6
app.otp.expiry-minutes=10
app.otp.resend-cooldown-seconds=30
app.otp.verified-window-minutes=15
app.otp.preview-enabled=${APP_OTP_PREVIEW_ENABLED:false}
app.otp.sms.mock-enabled=${APP_OTP_SMS_MOCK_ENABLED:true}
app.otp.email.mock-enabled=${APP_OTP_EMAIL_MOCK_ENABLED:true}
app.otp.email.from=${APP_OTP_EMAIL_FROM:${spring.mail.username}}
app.otp.email.from-name=${APP_OTP_EMAIL_FROM_NAME:Ecom Support}
app.otp.sms.provider=${APP_OTP_SMS_PROVIDER:mock}
app.otp.sms.twilio.account-sid=${APP_OTP_TWILIO_ACCOUNT_SID:}
app.otp.sms.twilio.auth-token=${APP_OTP_TWILIO_AUTH_TOKEN:}
app.otp.sms.twilio.from-number=${APP_OTP_TWILIO_FROM_NUMBER:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${APP_JWT_SECRET:shopping-cart-admin-secret-key-for-production-dashboard-2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:43200000}
app.payment.razorpay.key-id=${APP_RAZORPAY_KEY_ID:}
app.payment.razorpay.key-secret=${APP_RAZORPAY_KEY_SECRET:}
app.payment.razorpay.webhook-secret=${APP_RAZORPAY_WEBHOOK_SECRET:}
app.payment.razorpay.checkout-name=${APP_RAZORPAY_CHECKOUT_NAME:Ecom Store}
