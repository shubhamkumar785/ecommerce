<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base_modern::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Add Product | Seller Dashboard</title>
</head>
<body>
    <section class="min-h-screen bg-pastel-bg flex flex-col md:flex-row">
        <!-- Sidebar Fragment -->
        <aside th:replace="~{base_modern :: sellerSideBar('add_product')}"></aside>

        <!-- Main Content -->
        <div class="flex-1 w-full max-w-7xl mx-auto py-10 px-4 md:px-10">
            
            <!-- Header / Back -->
            <div class="mb-10 flex items-center justify-between">
                <div class="flex flex-col gap-1">
                    <h2 class="text-3xl font-heading font-black text-nav tracking-tight">Add New Product</h2>
                    <p class="text-slate-500 font-medium">List a new item in your store inventory.</p>
                </div>
                <a href="/seller/products" class="bg-white border border-slate-200 text-slate-600 px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-slate-50 transition shadow-sm">View Inventory</a>
            </div>

            <!-- Alerts -->
            <th:block th:if="${session.succMsg}">
                <div class="mb-8 bg-green-50 border border-green-100 text-green-600 px-6 py-4 rounded-2xl flex items-center gap-3 font-bold text-sm shadow-sm animate-[bounce_0.5s_ease-out]">
                    <i class="fa-solid fa-circle-check text-lg"></i> [[${session.succMsg}]]
                </div>
                <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
            </th:block>

            <th:block th:if="${session.errorMsg}">
                <div class="mb-8 bg-red-50 border border-red-100 text-red-600 px-6 py-4 rounded-2xl flex items-center gap-3 font-bold text-sm shadow-sm animate-[bounce_0.5s_ease-out]">
                    <i class="fa-solid fa-circle-exclamation text-lg"></i> [[${session.errorMsg}]]
                </div>
                <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
            </th:block>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                
                <!-- Main Form Card -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-[40px] p-8 md:p-12 shadow-[0_24px_48px_rgba(0,0,0,0.02)] border border-slate-100/50">
                        <form action="/seller/saveProduct" method="post" enctype="multipart/form-data" class="space-y-8">
                            
                            <!-- General Info -->
                            <div class="space-y-6">
                                <h3 class="text-sm font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-3">
                                    <div class="w-8 h-[2px] bg-orange-400"></div>
                                    Product Details
                                </h3>
                                
                                <div class="flex flex-col gap-2">
                                    <label class="text-[13px] font-bold text-slate-700 ml-1">Product Title</label>
                                    <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl px-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="title" type="text" placeholder="Summer Cotton T-Shirt">
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-[13px] font-bold text-slate-700 ml-1">Description</label>
                                    <textarea required rows="4" class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl px-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition resize-none" name="description" placeholder="Describe your product..."></textarea>
                                </div>
                            </div>

                            <!-- Price & Stock -->
                            <div class="pt-4 space-y-6">
                                <h3 class="text-sm font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-3">
                                    <div class="w-8 h-[2px] bg-orange-400"></div>
                                    Inventory & Pricing
                                </h3>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[13px] font-bold text-slate-700 ml-1">Sale Price (₹)</label>
                                        <div class="relative flex items-center">
                                            <div class="absolute left-6 text-slate-400 font-bold">₹</div>
                                            <input required class="w-full bg-slate-50 text-slate-800 text-sm font-black rounded-2xl pl-10 pr-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="price" type="number" step="0.01" placeholder="499.00">
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[13px] font-bold text-slate-700 ml-1">Cost Price (₹)</label>
                                        <div class="relative flex items-center">
                                            <div class="absolute left-6 text-slate-400 font-bold">₹</div>
                                            <input required class="w-full bg-slate-50 text-slate-800 text-sm font-black rounded-2xl pl-10 pr-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="costPrice" type="number" step="0.01" placeholder="300.00">
                                        </div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[13px] font-bold text-slate-700 ml-1">Stock Quantity</label>
                                        <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl px-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="stock" type="number" placeholder="50">
                                    </div>
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[13px] font-bold text-slate-700 ml-1">Category</label>
                                        <select required class="w-full bg-slate-50 text-slate-800 text-sm font-bold rounded-2xl px-6 py-4 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition appearance-none cursor-pointer" name="category">
                                            <option value="">Select Category</option>
                                            <option th:each="c:${categories}" th:value="${c.name}">[[${c.name}]]</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Upload & Submit -->
                            <div class="pt-8 flex flex-col md:flex-row items-center gap-6">
                                <button type="submit" onclick="this.innerHTML='<i class=\'fa-solid fa-circle-notch fa-spin\'></i> Uploading Product...'; this.classList.add('opacity-80')" class="w-full max-w-[340px] mx-auto bg-nav text-white rounded-[20px] py-3 px-8 font-bold text-xl shadow-lg hover:bg-slate-800 transition active:scale-95 flex items-center justify-center gap-3">
                                    List Product Now
                                    <i class="fa-solid fa-cloud-arrow-up text-xs opacity-50"></i>
                                </button>
                                <input required id="fileInput" class="hidden" name="file" type="file" accept="image/*" onchange="previewImage(event)">
                                <button type="button" onclick="document.getElementById('fileInput').click()" class="w-full md:w-auto bg-slate-100 text-slate-600 rounded-[24px] px-8 py-4.5 font-bold text-sm hover:bg-slate-200 transition">Change Photo</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Image Preview Card -->
                <div class="lg:col-span-1 sticky top-28">
                    <div class="bg-white rounded-[40px] p-8 shadow-[0_24px_48px_rgba(0,0,0,0.02)] border border-slate-100/50 flex flex-col items-center text-center">
                        <h3 class="text-sm font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Image Preview</h3>
                        
                        <div id="imgPlaceholder" class="w-full aspect-square bg-[#f8faff] rounded-[32px] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center gap-4 transition-all overflow-hidden relative group">
                            <i id="imgIcon" class="fa-solid fa-image text-5xl text-slate-200 group-hover:scale-110 transition-transform"></i>
                            <p id="imgText" class="text-xs font-bold text-slate-300 px-8">Upload a high-quality product image here</p>
                            <img id="preview" src="#" class="hidden w-full h-full object-contain p-6" alt="Preview">
                        </div>

                        <p class="mt-8 text-[11px] font-bold text-slate-400 leading-relaxed uppercase tracking-widest bg-slate-50 py-2 px-4 rounded-full">Recommended size: 800 x 1000px</p>
                    </div>
                </div>

            </div>

            <script>
                function previewImage(event) {
                    const reader = new FileReader();
                    reader.onload = function() {
                        const output = document.getElementById('preview');
                        const icon = document.getElementById('imgIcon');
                        const text = document.getElementById('imgText');
                        const holder = document.getElementById('imgPlaceholder');

                        output.src = reader.result;
                        output.classList.remove('hidden');
                        icon.classList.add('hidden');
                        text.classList.add('hidden');
                        holder.classList.remove('border-dashed');
                        holder.classList.add('bg-white');
                    };
                    reader.readAsDataURL(event.target.files[0]);
                }
            </script>
        </div>
    </section>
</body>
</html>
