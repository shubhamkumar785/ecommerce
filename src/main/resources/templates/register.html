<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base_modern::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Register | Ecom Store</title>
</head>
<body>
    <section class="min-h-[85vh] flex items-center justify-center py-10 px-4 md:px-0">
        
        <!-- Toast Alerts -->
        <th:block th:if="${session.succMsg}">
            <div class="fixed top-24 left-1/2 -translate-x-1/2 md:right-8 md:origin-top-right md:left-auto md:translate-x-0 bg-green-500 text-white px-6 py-3 rounded-2xl shadow-xl z-[100] flex items-center gap-2 font-bold w-[90%] md:w-auto text-sm animate-[bounce_0.5s_ease-out]">
                <i class="fa-solid fa-circle-check text-lg"></i> [[${session.succMsg}]]
            </div>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <th:block th:if="${session.errorMsg}">
            <div class="fixed top-24 left-1/2 -translate-x-1/2 md:right-8 md:origin-top-right md:left-auto md:translate-x-0 bg-red-500 text-white px-6 py-3 rounded-2xl shadow-xl z-[100] flex items-center gap-2 font-bold w-[90%] md:w-auto text-sm animate-[bounce_0.5s_ease-out]">
                <i class="fa-solid fa-circle-exclamation text-lg"></i> [[${session.errorMsg}]]
            </div>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <!-- Main Card Container -->
        <div class="w-full max-w-[1150px] bg-white rounded-[40px] shadow-[0_32px_64px_rgba(0,0,0,0.06)] overflow-hidden flex flex-col md:flex-row border border-slate-100/50">
            
            <!-- Left Side: Banner / Image -->
            <div id="sideBanner" class="w-full md:w-[35%] bg-[#FFF5AB] p-10 flex flex-col justify-between relative min-h-[250px] md:min-h-full overflow-hidden transition-colors duration-500">
                <!-- Decorative Elements -->
                <div class="absolute top-0 left-0 w-80 h-80 bg-white/40 rounded-full blur-[100px] -translate-y-1/2 -translate-x-1/4"></div>
                <div class="absolute bottom-10 right-0 w-64 h-64 bg-[#1F223D]/5 rounded-full blur-[80px] translate-x-1/4"></div>
                
                <div class="relative z-10 w-full lg:w-[90%]">
                    <span id="roleLabel" class="inline-block bg-[#1F223D] text-white text-[10px] font-bold px-3 py-1 rounded-full mb-6 tracking-widest uppercase">Customer</span>
                    <h2 id="bannerTitle" class="text-3xl md:text-5xl font-heading font-extrabold text-[#1F223D] leading-[1.1] mb-5 tracking-tight transition-all duration-500">Join Our <br/> Community</h2>
                    <p id="bannerDesc" class="text-slate-600 font-medium text-sm md:text-base opacity-80 leading-relaxed transition-all duration-500">Create an account to unlock exclusive features, save favorites, and checkout faster.</p>
                </div>
                
                <!-- Mockup Illustration -->
                <div class="relative z-10 mt-auto flex justify-center translate-y-10 md:translate-y-16 group">
                    <img id="bannerImg" src="/img/category_img/pant.png" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&fit=crop'" class="w-64 h-64 md:w-96 md:h-96 object-cover rounded-full border-[10px] border-white/60 mix-blend-multiply drop-shadow-2xl transition-all duration-700 group-hover:scale-105" alt="Store Community">
                </div>
            </div>

            <!-- Right Side: Registration Form -->
            <div class="w-full md:w-[65%] p-8 md:p-14 lg:p-20 flex flex-col justify-center bg-white relative z-20">
                
                <!-- Role Switcher Removed -->
                <div class="mb-10">
                    <div class="text-center">
                        <h3 id="formTitle" class="text-[26px] md:text-[32px] font-heading font-bold text-[#1F223D] mb-2 tracking-tight">Create an account</h3>
                        <p id="formDesc" class="text-sm md:text-[15px] text-slate-500 font-medium">Please fill in the details below to register.</p>
                    </div>
                </div>

                <form id="unifiedRegister" class="flex flex-col gap-6 md:gap-8">
                    <!-- Hidden Default Role -->
                    <input type="hidden" name="role" id="roleInput" value="ROLE_USER">

                    <!-- Personal Section -->
                    <div class="space-y-6">
                        <div class="flex items-center gap-3 mb-2">
                             <div class="w-8 h-[2px] bg-nav"></div>
                             <span class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Personal Information</span>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-[13px] font-bold text-slate-700 ml-1">Full Name</label>
                                <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl px-5 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="name" type="text" placeholder="John Doe">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[13px] font-bold text-slate-700 ml-1">Phone Number</label>
                                <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl px-5 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="mobileNumber" type="number" placeholder="+91 0000 0000 00">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-[13px] font-bold text-slate-700 ml-1">Email Address</label>
                            <div class="relative flex items-center group">
                                <i class="fa-regular fa-envelope absolute left-4 text-slate-400 group-focus-within:text-orange-400"></i>
                                <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="email" type="email" placeholder="john@example.com">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                            <div class="flex flex-col gap-2 relative">
                                <label class="text-[13px] font-bold text-slate-700 ml-1">Password</label>
                                <input required id="pass1" class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl pl-5 pr-12 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="password" type="password" placeholder="â¢â¢â¢â¢â¢â¢â¢â¢">
                                <button type="button" onclick="togglePass('pass1', 'eye1')" class="absolute right-4 top-[38px] text-slate-300 hover:text-orange-400 transition-colors">
                                    <i id="eye1" class="fa-regular fa-eye-slash text-sm"></i>
                                </button>
                            </div>
                            <div class="flex flex-col gap-2 relative">
                                <label class="text-[13px] font-bold text-slate-700 ml-1">Confirm Password</label>
                                <input required id="pass2" class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl pl-5 pr-12 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 transition" name="confirmpassword" type="password" placeholder="â¢â¢â¢â¢â¢â¢â¢â¢">
                                <button type="button" onclick="togglePass('pass2', 'eye2')" class="absolute right-4 top-[38px] text-slate-300 hover:text-orange-400 transition-colors">
                                    <i id="eye2" class="fa-regular fa-eye-slash text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Profile Image -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[13px] font-bold text-slate-700 ml-1">Profile Image <span class="text-slate-400 font-normal ml-1">(Optional)</span></label>
                        <div class="flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-2xl p-2 pr-6">
                             <input class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:text-[11px] file:font-black file:bg-nav file:text-white hover:file:bg-orange-600 transition h-10 flex items-center" name="img" type="file" accept="image/*">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="w-full max-w-[340px] mx-auto bg-nav text-white rounded-[20px] py-3 px-8 mt-6 font-bold text-xl shadow-lg hover:bg-slate-800 transition active:scale-95 flex items-center justify-center gap-3">
                        <span id="btnText">Submit</span>
                        <i class="fa-solid fa-arrow-right-long text-xs opacity-50"></i>
                    </button>
                </form>

                <!-- Login Link -->
                <p class="text-center text-sm font-medium text-slate-400 mt-10">
                    Already have an account? <a href="/signin" class="font-bold text-orange-600 hover:text-orange-700 hover:underline transition-all">Login here</a>
                </p>
            </div>
        </div>

        <script>
            // Simplified script (removed role selection)
            const currentRole = 'ROLE_USER';

            function togglePass(fid, bid) {
                const f = document.getElementById(fid);
                const b = document.getElementById(bid);
                if (f.type === "password") {
                    f.type = "text";
                    b.classList.replace("fa-eye-slash", "fa-eye");
                } else {
                    f.type = "password";
                    b.classList.replace("fa-eye", "fa-eye-slash");
                }
            }
            
            // Initial setup
            window.onload = () => {
                document.getElementById('roleInput').value = 'ROLE_USER';
            };

            document.getElementById('unifiedRegister').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const originalHtml = btn.innerHTML;
                
                // Form Fields Check
                const pass = document.getElementById('pass1').value;
                const confirmPass = document.getElementById('pass2').value;
                if (pass !== confirmPass) {
                    showGlobalToast('Password and confirm password must match', 'error');
                    return;
                }

                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
                btn.disabled = true;

                const formData = new FormData(this);
                
                try {
                    const response = await fetch('/api/auth/signup', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showGlobalToast('Registered successfully! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/signin';
                        }, 1500);
                    } else {
                        showGlobalToast(data.message || 'Error occurred during registration', 'error');
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                } catch (error) {
                    showGlobalToast('An error occurred. Please try again.', 'error');
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            });

            function showGlobalToast(message, type) {
                const toast = document.createElement('div');
                toast.className = `fixed top-24 left-1/2 -translate-x-1/2 md:right-8 md:origin-top-right md:left-auto md:translate-x-0 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-3 rounded-2xl shadow-xl z-[100] flex items-center gap-2 font-bold w-[90%] md:w-auto text-sm animate-[bounce_0.5s_ease-out]`;
                toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} text-lg"></i> ${message}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        </script>
        
        <style>
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </section>
</body>
</html>
