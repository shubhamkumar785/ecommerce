<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base_modern::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Forgot Password | Ecom Store</title>
</head>
<body>
    <section class="min-h-[85vh] flex items-center justify-center py-10 px-4 md:px-0">
        
        <!-- Toast Alerts -->
        <th:block th:if="${session.succMsg}">
            <div class="fixed top-24 left-1/2 -translate-x-1/2 md:right-8 md:origin-top-right md:left-auto md:translate-x-0 bg-green-500 text-white px-6 py-3 rounded-2xl shadow-xl z-[100] flex items-center gap-2 font-bold w-[90%] md:w-auto text-sm animate-[bounce_0.5s_ease-out]">
                <i class="fa-solid fa-circle-check text-lg"></i> [[${session.succMsg}]]
            </div>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <th:block th:if="${session.errorMsg}">
            <div class="fixed top-24 left-1/2 -translate-x-1/2 md:right-8 md:origin-top-right md:left-auto md:translate-x-0 bg-red-500 text-white px-6 py-3 rounded-2xl shadow-xl z-[100] flex items-center gap-2 font-bold w-[90%] md:w-auto text-sm animate-[bounce_0.5s_ease-out]">
                <i class="fa-solid fa-circle-exclamation text-lg"></i> [[${session.errorMsg}]]
            </div>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <!-- Main Card Container -->
        <div class="w-full max-w-[1000px] bg-white rounded-[32px] shadow-[0_20px_40px_rgba(0,0,0,0.04)] overflow-hidden flex flex-col md:flex-row border border-slate-100">
            
            <!-- Left Side: Banner / Image -->
            <div class="w-full md:w-1/2 bg-[#FFF5AB] p-10 flex flex-col justify-between relative min-h-[250px] md:min-h-[600px] overflow-hidden">
                <!-- Decorative Elements -->
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/30 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                <div class="absolute bottom-0 left-0 w-48 h-48 bg-orange-400/20 rounded-full blur-2xl translate-y-1/4 -translate-x-1/4"></div>
                
                <div class="relative z-10 w-3/4">
                    <h2 class="text-3xl md:text-5xl font-heading font-extrabold text-[#1F223D] leading-tight mb-4 tracking-tight">Forgot <br/> Password?</h2>
                    <p class="text-slate-600 font-medium text-sm md:text-base opacity-80">No worries! Enter your email and we'll send you instructions to reset your password.</p>
                </div>
                
                <!-- Illustration -->
                <div class="relative z-10 mt-auto flex justify-center translate-y-8 md:translate-y-12">
                    <img src="/img/category_img/laptop.jpg" onerror="this.src='https://images.unsplash.com/photo-1588702547319-bca3629e4b7b?w=500&fit=crop'" class="w-64 h-64 md:w-80 md:h-80 object-cover rounded-full border-4 border-white/50 mix-blend-multiply drop-shadow-xl" alt="Reset Password">
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="w-full md:w-1/2 p-8 md:p-14 flex flex-col justify-center bg-white relative z-20 shadow-[-10px_0_30px_rgba(0,0,0,0.03)]">
                <div class="mb-8">
                    <button onclick="history.back()" class="flex items-center gap-2 text-slate-400 hover:text-[#FF8833] transition font-bold text-sm mb-6 group">
                        <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i> Back
                    </button>
                    <h3 class="text-2xl font-heading font-bold text-[#1F223D] mb-2">Reset Password</h3>
                    <p class="text-sm text-slate-500 font-medium">Please enter your registered email address.</p>
                </div>

                <form action="/forgot-password" method="post" id="forgotForm" class="flex flex-col gap-6">
                    
                    <!-- Email Input -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">Email Address</label>
                        <div class="relative flex items-center">
                            <i class="fa-regular fa-envelope absolute left-4 text-slate-400"></i>
                            <input required class="w-full bg-slate-50 text-slate-800 text-sm font-medium rounded-2xl pl-11 pr-4 py-3.5 border border-slate-200 outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-300 transition placeholder-slate-400" name="email" type="email" placeholder="hello@example.com">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" onclick="const thisButton = this; setTimeout(function() { thisButton.innerHTML='<i class=\'fa-solid fa-circle-notch fa-spin\'></i> Sending instructions...'; thisButton.classList.add('opacity-80', 'cursor-not-allowed'); }, 50)" class="w-full max-w-[340px] mx-auto bg-nav text-white rounded-[20px] py-3 px-8 font-bold text-xl shadow-lg hover:bg-slate-800 transition active:scale-95 flex items-center justify-center gap-3 mt-4">
                        Send reset instructions
                    </button>
                </form>

                <!-- Help Link -->
                <p class="text-center text-sm font-medium text-slate-500 mt-10">
                    Remember your password? <a href="/signin" class="font-bold text-[#FF8833] hover:text-orange-600 hover:underline transition">Login here</a>
                </p>
            </div>
        </div>
    </section>
</body>
</html>
