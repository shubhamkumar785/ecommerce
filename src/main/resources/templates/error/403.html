<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Unauthorized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Outfit", sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 172, 108, 0.28), transparent 24%),
                radial-gradient(circle at bottom right, rgba(72, 113, 255, 0.2), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
            color: #16203a;
        }
        .error-card {
            width: min(560px, 100%);
            padding: 40px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(109, 132, 174, 0.14);
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.1);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(226, 77, 77, 0.12);
            color: #d44040;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        h1 {
            margin: 20px 0 12px;
            font-size: clamp(2rem, 5vw, 3.1rem);
            line-height: 1.05;
        }
        p {
            margin: 0;
            color: #5e6983;
            line-height: 1.7;
            font-size: 1.02rem;
        }
        .actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 18px;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
        }
        .button--primary { background: #2558ff; color: #fff; }
        .button--secondary { background: #edf2fb; color: #16203a; }
    </style>
</head>
<body>
    <section class="error-card">
        <span class="badge">403 Unauthorized</span>
        <h1>Admin access is restricted.</h1>
        <p>This page is available only to users with the administrator role. If you signed in with another account, the system correctly blocked access to protect the dashboard and its APIs.</p>
        <div class="actions">
            <a class="button button--primary" href="/signin">Go to Sign In</a>
            <a class="button button--secondary" href="/">Back to Store</a>
        </div>
    </section>
</body>
</html>
