<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base_modern::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Oops! Something went wrong</title>
</head>
<body>
<section class="max-w-[1400px] mx-auto px-4 md:px-8 py-20 flex flex-col items-center justify-center min-h-[60vh] text-center">
    <div class="mb-8">
        <i class="fa-solid fa-triangle-exclamation text-6xl text-orange-400"></i>
    </div>
    <h1 class="text-4xl md:text-5xl font-black text-[#1F223D] mb-4">Oops! Something went wrong.</h1>
    
    <p class="text-lg text-slate-500 mb-8 max-w-2xl" th:text="${error != null ? error : 'An unexpected server error occurred. Our team has been notified. We apologize for the inconvenience.'}">
        An unexpected server error occurred. Our team has been notified. We apologize for the inconvenience.
    </p>

    <a href="/" class="bg-gradient-to-r from-[#FF8833] to-[#FF9E54] text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all">
        <i class="fa-solid fa-house mr-2"></i> Return to Home
    </a>
</section>
</body>
</html>
