version: '3.8'

services:
  # MySQL Database Service
  mysqldb:
    image: mysql:8.0
    container_name: shopping_cart_db
    environment:
      - MYSQL_DATABASE=shopping_cart
      - MYSQL_ROOT_PASSWORD=shubham
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Spring Boot Application Service
  app:
    build: .
    container_name: shopping_cart_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:3306/shopping_cart?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=shubham
    depends_on:
      mysqldb:
        condition: service_healthy
    networks:
      - ecom_network

volumes:
  mysql_data:

networks:
  ecom_network:
    driver: bridge
